<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Basics Lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">MyDesignLab</div>
        <nav>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="content-wrapper">
        
        <section class="box-section">
            <h2>The Box Model</h2>
            <div class="box-container">
                <div class="model-box">
                    Interactive Box Model
                </div>
            </div>
        </section>

        <hr>

        <section class="flex-section">
            <h2>Flexbox Layout</h2>
            <div class="flex-container">
                <div class="flex-item box-blue">Item 1</div>
                <div class="flex-item box-green">Item 2</div>
                <div class="flex-item box-cyan">Item 3</div>
            </div>
        </section>

        <hr>

        <section class="form-section">
            <h2>Styled Registration Form</h2>
            <form class="styled-form">
                <div class="field">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter name">
                </div>
                <div class="field">
                    <label>Email Address</label>
                    <input type="email" placeholder="Enter email">
                </div>
                <button type="submit" class="btn-submit">Submit Form</button>
            </form>
        </section>

    </main>

    <footer class="main-footer">
        <p>&copy; 2026 CSS Basics Lab | Skill Wallet</p>
    </footer>

</body>
</html>
