<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Handling Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Interactive Events</h1>
        
        <button id="clickBtn">Click Me!</button>

        <div class="section">
            <input type="text" id="textInput" placeholder="Type something...">
            <p id="inputDisplay">Typed: </p>
        </div>

        <form id="userForm">
            <input type="text" id="username" placeholder="Username" required>
            <button type="submit">Submit Form</button>
        </form>

        <div id="hoverBox">Hover your mouse here!</div>
        
        <div id="statusArea">
            <p id="keyDisplay">Last Key Pressed: None</p>
            <p id="msgDisplay">Status: Waiting for action...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
